<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Jetipo</title>
    <style>
        /* CSS Section */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #fce4ec 0%, #ffebee 100%);
            font-family: 'Khmer OS Battambang', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 320px;
            text-align: center;
            z-index: 10;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* រូបថត */
        .photo-frame {
            width: 170px;
            height: 170px;
            margin: 0 auto 20px;
            border-radius: 50%;
            border: 5px solid #fff;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(233, 30, 99, 0.2);
        }

        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .heart-icon {
            font-size: 30px;
            animation: beat 0.5s infinite alternate;
        }

        @keyframes beat {
            to { transform: scale(1.3); }
        }

        h1 { color: #e91e63; font-size: 22px; margin: 10px 0; }
        .name { font-weight: bold; color: #555; margin-bottom: 10px; }
        .message { line-height: 1.6; color: #666; font-size: 14px; }

        /* ប៊ូតុង */
        button {
            background: #e91e63;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            font-family: 'Khmer OS Battambang';
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(233, 30, 99, 0.2);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(233, 30, 99, 0.3);
            background: #ad1457;
        }

        .signature {
            margin-top: 25px;
            font-style: italic;
            color: #e91e63;
            font-weight: bold;
        }

        /* បេះដូងធ្លាក់ */
        .floating-heart {
            position: fixed;
            top: -1%;
            z-index: 150;
            user-select: none;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to {
                top: 110%;
                transform: translateX(30px) rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="photo-frame">
            <img src="/asset/por.jpg" alt="Our Memory" class="profile-img">
        </div>

        <div class="heart-icon">❤️</div>
        <h1>រីករាយថ្ងៃខួបកំណើត!</h1>
        <p class="name">ជូនចំពោះ៖ VAN Viyuthipor</p>
        
        <p class="message">
            សូមឱ្យបងមានសុខភាពល្អ និងជោគជ័យគ្រប់ភារកិច្ច។ <br>
            អរគុណដែលតែងតែនៅក្បែរអូនជានិច្ច។ <br>
            ស្រឡាញ់បងបំផុត!
        </p>

        <button id="musicBtn" onclick="toggleMusic()">❤️Love Forever❤️</button>
        

        <p class="signature">By Kongkea</p>    
    </div>

    <script>
        // ១. មុខងារចាក់តន្ត្រី
        function toggleMusic() {
            var music = document.getElementById("bgMusic");
            var btn = document.getElementById("musicBtn");
            if (music.paused) {
                music.play();
                btn.innerHTML = "⏸️ បញ្ឈប់តន្ត្រី";
            } else {
                music.pause();
                btn.innerHTML = "🎵 ចុចស្តាប់បទចម្រៀង";
            }
        }

        // ២. មុខងារបង្កើតបេះដូងធ្លាក់ចុះ
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            heart.style.opacity = Math.random();
            heart.style.fontSize = Math.random() * 10 + 10 + 'px';
            
            document.body.appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, 5000);
        }
        setInterval(createHeart, 400);
    </script>

</body>
</html>
